<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kyro · search</title>
<style>
  :root {
    --bg: #06060f;
    --ink: #e6f1ff;
    --ink-dim: #8597b8;
    --ink-faint: #4a5878;
    --hit: #5cffb1;
    --miss: #6cb6ff;
    --legal: #b594ff;
    --medical: #ff9bd2;
    --technical: #5cffb1;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); overflow: hidden; }
  body {
    font-family: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  #stream {
    position: fixed; inset: 0;
    display: block;
  }

  /* Floating search bar */
  .frame {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .brand {
    pointer-events: auto;
    text-align: center;
    margin-bottom: 22px;
  }
  .brand .glyph {
    width: 38px; height: 38px; border-radius: 50%; margin: 0 auto 14px;
    background: radial-gradient(circle at 30% 30%, var(--hit), #1d4d3a 80%);
    box-shadow: 0 0 22px rgba(92,255,177,0.55);
    animation: bob 6s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .brand h1 {
    font-size: 12px; font-weight: 600; margin: 0; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink);
  }
  .brand p {
    margin: 6px 0 0; font-size: 11px; color: var(--ink-dim); letter-spacing: 0.18em; text-transform: uppercase;
  }

  .searchwrap {
    pointer-events: auto;
    width: min(720px, calc(100vw - 64px));
    position: relative;
  }
  #q {
    width: 100%;
    padding: 18px 80px 18px 24px;
    font: inherit;
    font-size: 16px;
    color: var(--ink);
    background: rgba(8,12,28,0.78);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(92,255,177,0.25);
    border-radius: 14px;
    outline: none;
    box-shadow:
      0 0 0 6px rgba(92,255,177,0.04),
      0 18px 60px rgba(0,0,0,0.55);
    letter-spacing: 0.01em;
  }
  #q:focus {
    border-color: rgba(92,255,177,0.65);
    box-shadow:
      0 0 0 6px rgba(92,255,177,0.10),
      0 18px 80px rgba(0,0,0,0.6);
  }
  #q::placeholder { color: var(--ink-faint); }
  .hint {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: var(--ink-faint); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    user-select: none; pointer-events: none;
  }
  .hint kbd {
    padding: 2px 6px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; background: rgba(255,255,255,0.04); color: var(--ink);
    font: inherit; font-size: 10px;
  }

  /* Suggestion chips under the search bar */
  .chips {
    margin-top: 14px;
    display: flex; flex-wrap: wrap; gap: 8px;
    pointer-events: auto;
  }
  .chip {
    padding: 6px 10px; border-radius: 999px;
    font: inherit; font-size: 11px; cursor: pointer;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink-dim);
    transition: all 200ms;
  }
  .chip:hover { color: var(--ink); border-color: rgba(92,255,177,0.4); transform: translateY(-1px); }

  /* Result drawer (slides up after a query) */
  .drawer {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(140%);
    width: min(820px, calc(100vw - 32px));
    background: rgba(8,12,28,0.86);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 22px;
    transition: transform 480ms cubic-bezier(.22,.9,.3,1);
    pointer-events: auto;
    z-index: 5;
  }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer h2 {
    margin: 0 0 12px; font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-faint);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer h2 .latency { color: var(--ink-dim); font-weight: 500; letter-spacing: 0.16em; }
  .drawer .result {
    display: grid; grid-template-columns: 80px 1fr 70px; gap: 14px;
    padding: 10px 0; border-top: 1px dashed rgba(255,255,255,0.06);
    align-items: start;
  }
  .drawer .result:first-of-type { border-top: none; }
  .drawer .domain {
    font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
    padding-top: 3px;
  }
  .drawer .domain.legal { color: var(--legal); }
  .drawer .domain.medical { color: var(--medical); }
  .drawer .domain.technical { color: var(--technical); }
  .drawer .body { color: var(--ink); }
  .drawer .body .title { font-weight: 600; margin-bottom: 4px; }
  .drawer .body .preview { color: var(--ink-dim); font-size: 12px; }
  .drawer .score {
    text-align: right; font-variant-numeric: tabular-nums;
    color: var(--hit); font-weight: 600;
  }
  .drawer .close {
    position: absolute; top: 14px; right: 18px;
    background: transparent; border: 0; color: var(--ink-faint); cursor: pointer;
    font-size: 16px;
  }
  .drawer .close:hover { color: var(--hit); }

  /* Footer link */
  .pagefoot {
    position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
    color: var(--ink-faint); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    pointer-events: auto;
  }
  .pagefoot a { color: var(--ink-dim); text-decoration: none; }
  .pagefoot a:hover { color: var(--hit); }
</style>
</head>
<body>
  <canvas id="stream"></canvas>

  <div class="frame">
    <div class="brand">
      <div class="glyph"></div>
      <h1>kyro</h1>
      <p>retrieval · cached · live</p>
    </div>

    <div class="searchwrap">
      <input id="q" type="text" autocomplete="off" spellcheck="false"
             placeholder="ask the river — privacy rights, drug interactions, rate limits…" />
      <div class="hint"><kbd>↵</kbd></div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div class="drawer" id="drawer" role="dialog" aria-label="Results">
    <button class="close" id="drawerClose" aria-label="Close">×</button>
    <h2><span id="drawerHead">results</span><span class="latency" id="drawerLat"></span></h2>
    <div id="drawerBody"></div>
  </div>

  <div class="pagefoot">
    <a href="/observatory">↗ observatory · live cache metrics</a>
  </div>

<script>
(() => {
  "use strict";
  const API = location.origin.startsWith("http") ? location.origin : "http://127.0.0.1:8766";
  const PRESETS = [
    "How do I authenticate API requests?",
    "What is your rate limit policy?",
    "Warfarin and aspirin interactions",
    "Pediatric acetaminophen dosing",
    "GDPR right to deletion",
    "Deploy kyro on Kubernetes",
  ];

  const DOMAIN_HUE = { legal: 270, medical: 320, technical: 150 };

  // ── Particle stream ─────────────────────────────────────────────────
  const canvas = document.getElementById("stream");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = innerWidth; H = innerHeight;
    placeChunks();
  }
  window.addEventListener("resize", resize);

  // ── Corpus chunks as floating constellations ───────────────────────
  let chunks = []; // { x, y, vx, vy, r, hue, glow, doc }
  let chunksByDomain = { legal: [], medical: [], technical: [] };

  function placeChunks() {
    if (!chunks.length) return;
    const domains = Object.keys(chunksByDomain);
    domains.forEach((dom, di) => {
      const list = chunksByDomain[dom];
      const cy = H * (0.32 + di * 0.18);
      list.forEach((c, i) => {
        const cx = (W * 0.18) + (i / Math.max(1, list.length - 1)) * (W * 0.64);
        c.homeX = cx + (Math.random() - 0.5) * 60;
        c.homeY = cy + (Math.random() - 0.5) * 80;
        if (c.x === undefined) { c.x = c.homeX; c.y = c.homeY; }
      });
    });
  }

  async function loadCorpus() {
    try {
      const r = await fetch(API + "/api/corpus/load");
      const m = await r.json();
      if (!m.loaded) return;
      chunks = (m.documents || []).map(d => ({
        doc: d,
        x: undefined, y: undefined,
        homeX: 0, homeY: 0,
        vx: 0, vy: 0,
        r: 4 + Math.random() * 1.5,
        hue: DOMAIN_HUE[d.domain] || 200,
        glow: 0,
        targetGlow: 0,
      }));
      chunksByDomain = { legal: [], medical: [], technical: [] };
      for (const c of chunks) (chunksByDomain[c.doc.domain] ||= []).push(c);
      placeChunks();
    } catch (e) {
      console.warn("corpus load failed", e);
    }
  }

  class Ambient {
    constructor() { this.reset(true); }
    reset(initial=false) {
      this.x = initial ? Math.random() * W : -8;
      this.y = Math.random() * H;
      this.vx = 0.25 + Math.random() * 0.85;
      this.r = Math.random() < 0.04 ? 1.6 : 0.7;
      this.alpha = 0.10 + Math.random() * 0.30;
      this.hue = 200 + Math.random() * 50;
    }
    step() {
      this.x += this.vx;
      if (this.x > W + 8) this.reset(false);
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.alpha})`;
      ctx.fill();
    }
  }

  resize();
  const ambients = Array.from({ length: 220 }, () => new Ambient());

  function frame() {
    ctx.clearRect(0, 0, W, H);

    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "rgba(108,182,255,0.04)");
    g.addColorStop(1, "rgba(108,182,255,0.02)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    for (const a of ambients) { a.step(); a.draw(); }

    // Highest-glow chunk drifts toward the centre.
    const cx = W / 2, cy = H / 2;
    let lead = null;
    for (const c of chunks) {
      if (!lead || c.targetGlow > lead.targetGlow) lead = c;
    }

    for (const c of chunks) {
      const tx = (c === lead && c.targetGlow > 0.05) ? cx : c.homeX;
      const ty = (c === lead && c.targetGlow > 0.05) ? cy : c.homeY;
      c.vx += (tx - c.x) * 0.0035;
      c.vy += (ty - c.y) * 0.0035;
      c.vx *= 0.93; c.vy *= 0.93;
      c.x += c.vx; c.y += c.vy;
      c.glow += (c.targetGlow - c.glow) * 0.08;

      const r = c.r + c.glow * 4;
      const alpha = 0.55 + c.glow * 0.45;
      ctx.save();
      ctx.shadowBlur = 8 + c.glow * 22;
      ctx.shadowColor = `hsla(${c.hue}, 90%, 70%, ${0.7 + c.glow * 0.3})`;
      ctx.fillStyle = `hsla(${c.hue}, 90%, 75%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
      ctx.fill();

      if (c.glow > 0.1) {
        const grad = ctx.createRadialGradient(c.x, c.y, r, c.x, c.y, r * 5);
        grad.addColorStop(0, `hsla(${c.hue}, 90%, 70%, ${0.35 * c.glow})`);
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(c.x, c.y, r * 5, 0, Math.PI * 2);
        ctx.fill();
        if (c === lead && c.glow > 0.4) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = `rgba(230,241,255,${0.85 * c.glow})`;
          ctx.font = "11px ui-monospace, Menlo, monospace";
          ctx.textAlign = "center";
          ctx.fillText(c.doc.title.toUpperCase(), c.x, c.y - r - 12);
        }
      }
      ctx.restore();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ── Live preview while typing: simple lexical match against doc text ─
  function previewMatch(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
      for (const c of chunks) c.targetGlow = 0;
      return;
    }
    const tokens = q.split(/\s+/).filter(t => t.length > 1);
    for (const c of chunks) {
      const hay = (c.doc.title + " " + c.doc.preview).toLowerCase();
      let hits = 0;
      for (const t of tokens) if (hay.includes(t)) hits++;
      const score = tokens.length ? hits / tokens.length : 0;
      c.targetGlow = score;
    }
  }

  // ── Real query against the corpus ───────────────────────────────────
  async function runQuery(question) {
    const drawer = document.getElementById("drawer");
    const body = document.getElementById("drawerBody");
    const head = document.getElementById("drawerHead");
    const lat = document.getElementById("drawerLat");
    body.innerHTML = `<div style="color:var(--ink-dim);padding:14px 0;">retrieving…</div>`;
    drawer.classList.add("open");

    try {
      const url = API + "/api/corpus/demo?query=" + encodeURIComponent(question) + "&top_k=3";
      const r = await fetch(url);
      const j = await r.json();
      head.textContent = `top ${(j.results||[]).length} for · ${j.query}`;
      lat.textContent = (j.latency_ms ?? 0).toFixed(2) + " ms";
      body.innerHTML = "";
      for (const hit of (j.results || [])) {
        const row = document.createElement("div");
        row.className = "result";
        row.innerHTML = `
          <div class="domain ${hit.domain}">${hit.domain}</div>
          <div class="body">
            <div class="title">${escapeHtml(hit.title)}</div>
            <div class="preview">${escapeHtml(hit.preview)}…</div>
          </div>
          <div class="score">${hit.score_pct}%</div>
        `;
        body.appendChild(row);
        const c = chunks.find(x => x.doc.id === hit.doc_id);
        if (c) c.targetGlow = Math.max(c.targetGlow, 0.85);
      }
    } catch (e) {
      body.innerHTML = `<div style="color:var(--miss);">retrieval failed: ${escapeHtml(e.message)}</div>`;
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ── Bindings ─────────────────────────────────────────────────────────
  const input = document.getElementById("q");
  let typingTimer = null;
  input.addEventListener("input", () => {
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => previewMatch(input.value), 60);
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const v = input.value.trim();
      if (v) runQuery(v);
    } else if (e.key === "Escape") {
      document.getElementById("drawer").classList.remove("open");
      input.value = "";
      previewMatch("");
    }
  });
  document.getElementById("drawerClose").addEventListener("click", () => {
    document.getElementById("drawer").classList.remove("open");
  });

  // Render preset chips.
  const chipBox = document.getElementById("chips");
  for (const p of PRESETS) {
    const c = document.createElement("button");
    c.className = "chip"; c.type = "button";
    c.textContent = p;
    c.addEventListener("click", () => {
      input.value = p; previewMatch(p); runQuery(p);
      input.focus();
    });
    chipBox.appendChild(c);
  }

  loadCorpus().then(() => input.focus());
})();
</script>
</body>
</html>
